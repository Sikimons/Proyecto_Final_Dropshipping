openapi: "3.0.3"

info:
  title: Dropshipping Service — Provider Order Management API
  description: |
    API REST para la gestión de órdenes Dropshipping por parte del proveedor.
    Permite al proveedor autenticado consultar sus órdenes asignadas y responderlas
    (aceptar con fecha estimada de despacho o rechazar con motivo).

    **API First**: Este contrato es la fuente de verdad. Los stubs del servidor se
    generan automáticamente con openapi-generator.

    **Autenticación**: Bearer token requerido en todas las operaciones. La autenticación
    es gestionada por un sistema externo; este servicio valida el token y extrae el
    `providerId` del contexto de seguridad.
  version: "1.0.0"
  contact:
    name: Equipo Dropshipping Service
    email: claude@colinealcorp.com

servers:
  - url: http://localhost:8080/api/v1
    description: Servidor de desarrollo local

security:
  - bearerAuth: []

tags:
  - name: Provider Orders
    description: Operaciones de consulta y respuesta de órdenes para proveedores

paths:

  /providers/{providerId}/orders:
    get:
      tags:
        - Provider Orders
      summary: Listar órdenes asignadas al proveedor
      description: |
        Retorna todas las órdenes Dropshipping asignadas al proveedor indicado.
        Se puede filtrar por estado. Si no se especifica filtro, retorna todas las órdenes.
      operationId: getProviderOrders
      parameters:
        - $ref: '#/components/parameters/providerIdParam'
        - name: status
          in: query
          required: false
          description: Filtrar por estado de la orden
          schema:
            $ref: '#/components/schemas/OrderStatus'
      responses:
        "200":
          description: Listado de órdenes recuperado exitosamente
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/DropshippingOrderSummary'
        "400":
          $ref: '#/components/responses/BadRequest'
        "404":
          $ref: '#/components/responses/NotFound'
        "500":
          $ref: '#/components/responses/InternalServerError'

  /providers/{providerId}/orders/{orderId}:
    get:
      tags:
        - Provider Orders
      summary: Obtener detalle completo de una orden
      operationId: getOrderDetail
      parameters:
        - $ref: '#/components/parameters/providerIdParam'
        - $ref: '#/components/parameters/orderIdParam'
      responses:
        "200":
          description: Detalle de la orden recuperado exitosamente
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DropshippingOrderDetail'
        "400":
          $ref: '#/components/responses/BadRequest'
        "403":
          $ref: '#/components/responses/Forbidden'
        "404":
          $ref: '#/components/responses/NotFound'
        "500":
          $ref: '#/components/responses/InternalServerError'

  /providers/{providerId}/orders/{orderId}/accept:
    post:
      tags:
        - Provider Orders
      summary: Aceptar una orden con fecha estimada de despacho
      operationId: acceptOrder
      parameters:
        - $ref: '#/components/parameters/providerIdParam'
        - $ref: '#/components/parameters/orderIdParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AcceptOrderRequest'
      responses:
        "200":
          description: Orden aceptada exitosamente
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OrderActionResponse'
        "400":
          $ref: '#/components/responses/BadRequest'
        "404":
          $ref: '#/components/responses/NotFound'
        "409":
          description: Conflicto — La orden ya tiene un estado definitivo
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "500":
          $ref: '#/components/responses/InternalServerError'

  /providers/{providerId}/orders/{orderId}/reject:
    post:
      tags:
        - Provider Orders
      summary: Rechazar una orden indicando el motivo
      operationId: rejectOrder
      parameters:
        - $ref: '#/components/parameters/providerIdParam'
        - $ref: '#/components/parameters/orderIdParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RejectOrderRequest'
      responses:
        "200":
          description: Orden rechazada exitosamente
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OrderActionResponse'
        "400":
          $ref: '#/components/responses/BadRequest'
        "404":
          $ref: '#/components/responses/NotFound'
        "409":
          description: Conflicto — La orden ya tiene un estado definitivo
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "500":
          $ref: '#/components/responses/InternalServerError'

components:

  parameters:
    providerIdParam:
      name: providerId
      in: path
      required: true
      description: Identificador único del proveedor
      schema:
        type: integer
        format: int64
        example: 42

    orderIdParam:
      name: orderId
      in: path
      required: true
      description: Identificador único de la orden
      schema:
        type: integer
        format: int64
        example: 1

  schemas:

    OrderStatus:
      type: string
      enum:
        - PENDING
        - ACCEPTED
        - REJECTED

    AddressDto:
      type: object
      required:
        - street
        - city
        - state
        - country
      properties:
        street:
          type: string
        city:
          type: string
        state:
          type: string
        postalCode:
          type: string
          nullable: true
        country:
          type: string

    DropshippingOrderSummary:
      type: object
      required:
        - orderId
        - orderCode
        - productCode
        - productDescription
        - quantity
        - status
        - expectedDeliveryDate
      properties:
        orderId:
          type: integer
          format: int64
        orderCode:
          type: string
        productCode:
          type: string
        productDescription:
          type: string
        quantity:
          type: integer
          minimum: 1
        status:
          $ref: '#/components/schemas/OrderStatus'
        expectedDeliveryDate:
          type: string
          format: date

    OrderStatusEventDto:
      type: object
      properties:
        eventId:
          type: integer
          format: int64
        previousStatus:
          $ref: '#/components/schemas/OrderStatus'
        newStatus:
          $ref: '#/components/schemas/OrderStatus'
        actorId:
          type: string
        timestamp:
          type: string
          format: date-time
        estimatedDispatchDate:
          type: string
          format: date
          nullable: true
        rejectionReason:
          type: string
          nullable: true

    DropshippingOrderDetail:
      type: object
      required:
        - orderId
        - orderCode
        - productCode
        - productDescription
        - quantity
        - deliveryAddress
        - customerName
        - customerContact
        - expectedDeliveryDate
        - status
        - createdAt
        - updatedAt
        - statusHistory
      properties:
        orderId:
          type: integer
          format: int64
        orderCode:
          type: string
        productCode:
          type: string
        productDescription:
          type: string
        quantity:
          type: integer
          minimum: 1
        deliveryAddress:
          $ref: '#/components/schemas/AddressDto'
        customerName:
          type: string
        customerContact:
          type: string
        expectedDeliveryDate:
          type: string
          format: date
        specialConditions:
          type: string
          nullable: true
        status:
          $ref: '#/components/schemas/OrderStatus'
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
        statusHistory:
          type: array
          items:
            $ref: '#/components/schemas/OrderStatusEventDto'

    AcceptOrderRequest:
      type: object
      required:
        - estimatedDispatchDate
      properties:
        estimatedDispatchDate:
          type: string
          format: date
          description: Fecha estimada de despacho. DEBE ser posterior a la fecha actual.

    RejectOrderRequest:
      type: object
      required:
        - reason
      properties:
        reason:
          type: string
          minLength: 1
          maxLength: 1000
          description: Motivo del rechazo. Obligatorio y no puede estar vacío.

    OrderActionResponse:
      type: object
      required:
        - orderId
        - orderCode
        - previousStatus
        - newStatus
        - actorId
        - timestamp
        - message
      properties:
        orderId:
          type: integer
          format: int64
        orderCode:
          type: string
        previousStatus:
          $ref: '#/components/schemas/OrderStatus'
        newStatus:
          $ref: '#/components/schemas/OrderStatus'
        actorId:
          type: string
        timestamp:
          type: string
          format: date-time
        estimatedDispatchDate:
          type: string
          format: date
          nullable: true
        rejectionReason:
          type: string
          nullable: true
        message:
          type: string

    ErrorResponse:
      type: object
      required:
        - timestamp
        - status
        - error
        - message
        - path
      properties:
        timestamp:
          type: string
          format: date-time
        status:
          type: integer
        error:
          type: string
        message:
          type: string
        path:
          type: string

  responses:
    BadRequest:
      description: Solicitud inválida (validación fallida)
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'

    NotFound:
      description: Recurso no encontrado
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'

    Forbidden:
      description: El proveedor no tiene acceso a esta orden
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'

    InternalServerError:
      description: Error interno del servidor
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'

  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: |
        Token JWT emitido por el sistema de autenticación externo.
        Incluir en el header: `Authorization: Bearer <token>`
